blueprint:
  name: Pill Logger Reminder
  description: "Advanced reminder loop for the Pill Logger integration. Features Snooze, Skip, custom actions, and auto-logging."
  domain: automation
  input:
    notify_device:
      name: Notification Device
      description: The mobile phone to send the reminder to.
      selector:
        device:
          integration: mobile_app
    next_dose_sensor:
      name: Next Dose Sensor
      description: The Timestamp sensor generated by Pill Logger.
      selector:
        entity:
          integration: pill_logger 
          domain: sensor
          device_class: timestamp
    take_button:
      name: Take Pill Button
      description: The button generated by Pill Logger to log the dose.
      selector:
        entity:
          integration: pill_logger
          domain: button
    safe_to_take_sensor:
      name: Pills Safe to Take Sensor
      description: >
        The "Pills Safe to Take" sensor generated by Pill Logger. Used to gate
        the Taken action so a dose taken from the notification cannot bypass
        the pill-limit safety window. Leave blank to disable the guard (not
        recommended for scheduled medications).
      default: ""
      selector:
        entity:
          integration: pill_logger
          domain: sensor
    notification_title:
      name: Notification name
      description: "Default: Medicine reminder"
      default: "Medicine reminder"
    notification_message:
      name: Notification message (Optional)
      description: "Default: It's time to take your medication"
      default: "It's time to take your medication"
    optional_action:
      name: Optional action
      description: Run an action like notify a speaker at the same time as the mobile notification
      selector:
        action: {}
      default: []
    snooze_time:
      name: Snooze Time (minutes)
      default: 30
      selector:
        number:
          min: 5
          max: 120
          unit_of_measurement: min

variables:
  # Expose notify_device so device-action templates can resolve it
  notify_device: !input notify_device
  # Create unique action IDs so multiple pill alarms don't cross-talk
  next_dose_sensor: !input next_dose_sensor
  btn_entity: !input take_button
  safe_sensor: !input safe_to_take_sensor
  action_take: "TAKE_{{ btn_entity }}"
  action_snooze: "SNOOZE_{{ btn_entity }}"
  action_skip: "SKIP_{{ btn_entity }}"
  tag_id: "reminder_{{ btn_entity }}"
  snooze_delay: !input snooze_time
  # Whether the safety guard is active (sensor selected and resolvable)
  guard_active: "{{ safe_sensor not in ['', 'none'] and states(safe_sensor) not in ['unknown', 'unavailable', 'none', ''] }}"
  # Pills currently safe to take (int); 0 means at the pill-limit window
  safe_count: "{{ states(safe_sensor) | int(0) if guard_active | bool else -1 }}"

trigger:
  - platform: time
    at: !input next_dose_sensor

mode: restart

action:
  - alias: "Reminder Loop"
    repeat:
      while:
        # Loop while the sensor is in the past (meaning they haven't taken it yet)
        - condition: template
          value_template: "{{ states(next_dose_sensor) not in ['unknown', 'unavailable', 'none', ''] and now() >= states(next_dose_sensor) | as_datetime }}"
      sequence:
        # 1. Run the Optional Action (e.g., TTS to Smart Speaker)
        - choose:
            - conditions: "{{ true }}"
              sequence: !input optional_action

        # 1.5 Clear the old notification so the new one triggers a sound
        - device_id: !input notify_device
          domain: mobile_app
          type: notify
          message: "clear_notification"
          data:
            tag: "{{ tag_id }}"

        # 2. Send the Mobile Notification
        - device_id: !input notify_device
          domain: mobile_app
          type: notify
          title: !input notification_title
          message: !input notification_message
          data:
            ttl: 0
            priority: "high"
            tag: "{{ tag_id }}"
            actions:
              - action: "{{ action_take }}"
                title: "Taken"
              - action: "{{ action_snooze }}"
                title: "Snooze ({{ snooze_delay }}m)"
              - action: "{{ action_skip }}"
                title: "Skip Dose"
        
        # 3. Wait for the user to tap a button (notification action or HA button press)
        - wait_for_trigger:
            - platform: event
              event_type: mobile_app_notification_action
              event_data:
                action: "{{ action_take }}"
            - platform: event
              event_type: mobile_app_notification_action
              event_data:
                action: "{{ action_snooze }}"
            - platform: event
              event_type: mobile_app_notification_action
              event_data:
                action: "{{ action_skip }}"
            - platform: event
              event_type: pill_logger_pill_taken
              event_data:
                entity_id: "{{ btn_entity }}"
          timeout:
            minutes: !input snooze_time
          continue_on_timeout: true

        # 4. Handle the response
        - choose:
            - conditions: "{{ wait.trigger is not none and wait.trigger.platform == 'event' and wait.trigger.event.data.action == action_take }}"
              sequence:
                # Safety guard: if a Pills Safe to Take sensor is configured
                # and the rolling pill-limit window is exhausted (safe_count
                # <= 0), do NOT auto-press the Take button from the
                # notification. Instead warn the user and let them decide
                # via the card UI (which shows the override confirm dialog).
                - choose:
                    - conditions: "{{ guard_active | bool and safe_count | int(0) <= 0 }}"
                      sequence:
                        - device_id: !input notify_device
                          domain: mobile_app
                          type: notify
                          title: !input notification_title
                          message: "Pill limit reached — open the Pill Logger card to override if needed."
                          data:
                            ttl: 0
                            priority: "high"
                            tag: "{{ tag_id }}"
                        - stop: "Pill limit reached; Take action blocked."
                  default:
                    - action: button.press
                      target:
                        entity_id: !input take_button
            
            - conditions: "{{ wait.trigger is not none and wait.trigger.platform == 'event' and wait.trigger.event.data.action == action_snooze }}"
              sequence:
                - delay:
                    minutes: !input snooze_time
            
            - conditions: "{{ wait.trigger is not none and wait.trigger.platform == 'event' and wait.trigger.event.data.action == action_skip }}"
              sequence:
                - device_id: !input notify_device
                  domain: mobile_app
                  type: notify
                  message: "clear_notification"
                  data:
                    tag: "{{ tag_id }}"
                - stop: "User skipped."

            - conditions: "{{ wait.trigger is not none and wait.trigger.platform == 'event' and wait.trigger.event.data.event_type == 'pill_logger_pill_taken' }}"
              sequence:
                - device_id: !input notify_device
                  domain: mobile_app
                  type: notify
                  message: "clear_notification"
                  data:
                    tag: "{{ tag_id }}"
          
          # If no response (timeout), loop again
          default: []
