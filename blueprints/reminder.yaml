blueprint:
  name: Pill Logger Reminder
  description: "Advanced reminder loop for the Pill Logger integration. Features Dashboard tracking, Snooze, Skip, and auto-logging."
  domain: automation
  input:
    notify_device:
      name: Notification Device
      description: The mobile phone to send the reminder to.
      selector:
        device:
          integration: mobile_app
    next_dose_sensor:
      name: Next Dose Sensor
      description: The Timestamp sensor generated by Pill Logger.
      selector:
        entity:
          integration: pill_logger 
          domain: sensor
          device_class: timestamp
    take_button:
      name: Take Pill Button
      description: The button generated by Pill Logger to log the dose.
      selector:
        entity:
          integration: pill_logger 
          domain: button
    notification_title:
      name: Notification name
      description: "Default: Medicine reminder"
      default: "Medicine reminder"
    notification_message:
      name: Notification message (Optional)
      description: "Default: It's time to take your medication"
      default: "It's time to take your medication"
    optional_action:
      name: Optional action
      description: Run an action like notify a speaker at the same time as the mobile notification
      selector:
        action: {}
      default: []
    snooze_time:
      name: Snooze Time (minutes)
      default: 30
      selector:
        number:
          min: 5
          max: 120
          unit_of_measurement: min

variables:
  next_dose_sensor: !input next_dose_sensor
  btn_entity: !input take_button
  action_take: "TAKE_{{ btn_entity }}"
  action_snooze: "SNOOZE_{{ btn_entity }}"
  action_skip: "SKIP_{{ btn_entity }}"
  tag_id: "reminder_{{ btn_entity }}"
  snooze_delay: !input snooze_time

trigger:
  - platform: time
    at: !input next_dose_sensor

# Protective Gate: Instantly aborts restarts if the dose is not genuinely due/overdue
condition:
  - condition: template
    value_template: "{{ states(next_dose_sensor) != 'unknown' and now() >= states(next_dose_sensor) | as_datetime }}"

mode: restart

action:
  - alias: "Reminder Loop"
    repeat:
      while:
        - condition: template
          value_template: "{{ states(next_dose_sensor) != 'unknown' and now() >= states(next_dose_sensor) | as_datetime }}"
      sequence:
        - choose:
            - conditions: "{{ true }}"
              sequence: !input optional_action

        - service: notify.mobile_app_{{ device_attr(notify_device, 'name') }}
          data:
            message: "clear_notification"
            data:
              tag: "{{ tag_id }}"

        - device_id: !input notify_device
          domain: mobile_app
          type: notify
          title: !input notification_title
          message: !input notification_message
          data:
            ttl: 0
            priority: "high"
            tag: "{{ tag_id }}"
            actions:
              - action: "{{ action_take }}"
                title: "Taken"
              - action: "{{ action_snooze }}"
                title: "Snooze ({{ snooze_delay }}m)"
              - action: "{{ action_skip }}"
                title: "Skip Dose"
        
        # Listens to both mobile events AND dashboard button clicks
        - wait_for_trigger:
            - platform: event
              event_type: mobile_app_notification_action
              event_data:
                action: "{{ action_take }}"
            - platform: event
              event_type: mobile_app_notification_action
              event_data:
                action: "{{ action_snooze }}"
            - platform: event
              event_type: mobile_app_notification_action
              event_data:
                action: "{{ action_skip }}"
            - platform: state
              entity_id: !input take_button
          timeout:
            minutes: !input snooze_time

        - choose:
            # Tapped "Taken" on phone notification
            - conditions: "{{ wait.trigger is not none and wait.trigger.platform == 'event' and wait.trigger.event.data.action == action_take }}"
              sequence:
                - service: button.press
                  target:
                    entity_id: !input take_button
            
            # Tapped "Snooze" on phone notification
            - conditions: "{{ wait.trigger is not none and wait.trigger.platform == 'event' and wait.trigger.event.data.action == action_snooze }}"
              sequence:
                - delay:
                    minutes: !input snooze_time
            
            # Tapped "Skip" on phone notification
            - conditions: "{{ wait.trigger is not none and wait.trigger.platform == 'event' and wait.trigger.event.data.action == action_skip }}"
              sequence:
                - device_id: !input notify_device
                  domain: mobile_app
                  type: notify
                  message: "clear_notification"
                  data:
                    tag: "{{ tag_id }}"
                - stop: "User skipped."

            # Pressed button directly on Home Assistant dashboard
            - conditions: "{{ wait.trigger is not none and wait.trigger.platform == 'state' }}"
              sequence:
                - device_id: !input notify_device
                  domain: mobile_app
                  type: notify
                  message: "clear_notification"
                  data:
                    tag: "{{ tag_id }}"
          default: []
