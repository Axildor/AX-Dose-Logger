# Service field definitions for the ax_dose_logger integration.
#
# Services are registered in code (services.py) with voluptuous schemas,
# but Home Assistant also requires this file to populate the service UI
# with field selectors.  Human-readable names and descriptions live in
# strings.json / translations/en.json under the "services" key.

take_dose:
  fields:
    entry_id:
      required: true
      selector:
        config_entry:
          integration: ax_dose_logger
    timestamp:
      required: false
      selector:
        datetime:

undo_dose:
  fields:
    entry_id:
      required: true
      selector:
        config_entry:
          integration: ax_dose_logger

reset:
  fields:
    entry_id:
      required: true
      selector:
        config_entry:
          integration: ax_dose_logger

adherence_reset:
  fields:
    entry_id:
      required: true
      selector:
        config_entry:
          integration: ax_dose_logger

adherence_override:
  fields:
    entry_id:
      required: true
      selector:
        config_entry:
          integration: ax_dose_logger

set_metric:
  fields:
    entity_id:
      required: true
      selector:
        entity:
          integration: ax_dose_logger
          domain: number
    value:
      required: true
      selector:
        number:
          min: 0
          max: 10
          step: 1
          mode: box
    override:
      required: false
      selector:
        boolean: