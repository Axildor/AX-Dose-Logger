# Service field definitions for the pill_logger integration.
#
# Services are registered in code (services.py) with voluptuous schemas,
# but Home Assistant also requires this file to populate the service UI
# with field selectors.  Human-readable names and descriptions live in
# strings.json / translations/en.json under the "services" key.

take_dose:
  fields:
    entry_id:
      required: true
      selector:
        config_entry:
          integration: pill_logger
    timestamp:
      required: false
      selector:
        datetime:

undo_dose:
  fields:
    entry_id:
      required: true
      selector:
        config_entry:
          integration: pill_logger

reset:
  fields:
    entry_id:
      required: true
      selector:
        config_entry:
          integration: pill_logger

adherence_reset:
  fields:
    entry_id:
      required: true
      selector:
        config_entry:
          integration: pill_logger

adherence_override:
  fields:
    entry_id:
      required: true
      selector:
        config_entry:
          integration: pill_logger